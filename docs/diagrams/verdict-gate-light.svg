<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 500" width="680" height="500" role="img" aria-label="The verdict gate decision flow">
  <title>The verdict gate</title>
  <style>
    svg {
      --node-fill: #f6f8fa; --node-stroke: #d1d9e0; --node-text: #1f2328;
      --muted: #59636e; --edge: #59636e;
      --chip-bg: #eaeef2; --chip-text: #57606a;
      --drop-fill: #ffebe9; --drop-stroke: #cf222e; --drop-text: #82071e;
      --fwd-fill: #dafbe1; --fwd-stroke: #1a7f37; --fwd-text: #116329;
      --warn-fill: #fff8c5; --warn-stroke: #9a6700; --warn-text: #7d4e00;
    }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
    .box { fill: var(--node-fill); stroke: var(--node-stroke); stroke-width: 1.25; }
    .t2 { font-size: 12px; font-weight: 600; fill: var(--node-text); }
    .sub { font-size: 10.5px; fill: var(--muted); }
    .lab { font-size: 10.5px; font-weight: 500; fill: var(--muted); }
    .chip { fill: var(--chip-bg); }
    .chipT { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 10px; fill: var(--chip-text); }
    .edge { stroke: var(--edge); stroke-width: 1.4; fill: none; }
    .dropB { fill: var(--drop-fill); stroke: var(--drop-stroke); stroke-width: 1.25; }
    .dropT { font-size: 12px; font-weight: 600; fill: var(--drop-text); }
    .dropS { font-size: 9.5px; fill: var(--drop-text); opacity: .75; }
    .fwdB { fill: var(--fwd-fill); stroke: var(--fwd-stroke); stroke-width: 1.25; }
    .fwdT { font-size: 12px; font-weight: 600; fill: var(--fwd-text); }
    .warnB { fill: var(--warn-fill); stroke: var(--warn-stroke); stroke-width: 1.25; }
    .warnT { font-size: 12px; font-weight: 600; fill: var(--warn-text); }
    .warnS { font-size: 9.5px; fill: var(--warn-text); opacity: .8; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--edge)"/>
    </marker>
  </defs>

  <rect class="box" x="70" y="8" width="300" height="40" rx="20"/>
  <text class="t2" x="220" y="32.5" text-anchor="middle">Inbound message · spam &amp; virus verdicts</text>

  <rect class="box" x="70" y="76" width="300" height="56" rx="10"/>
  <text class="t2" x="220" y="108.5" text-anchor="middle">virus verdict = FAIL?</text>
  <rect class="dropB" x="460" y="80" width="170" height="48" rx="24"/>
  <text class="dropT" x="545" y="99" text-anchor="middle">Drop · virus</text>
  <text class="dropS" x="545" y="115" text-anchor="middle">always on</text>

  <rect class="box" x="70" y="168" width="300" height="56" rx="10"/>
  <text class="t2" x="220" y="190" text-anchor="middle">virus verdict = PROCESSING_FAILED?</text>
  <rect class="chip" x="120" y="197" width="200" height="17" rx="8.5"/>
  <text class="chipT" x="220" y="209" text-anchor="middle">opt-in · DROP_UNSCANNED=true</text>
  <rect class="dropB" x="460" y="176" width="170" height="40" rx="20"/>
  <text class="dropT" x="545" y="200.5" text-anchor="middle">Drop · unscanned</text>

  <rect class="box" x="70" y="260" width="300" height="56" rx="10"/>
  <text class="t2" x="220" y="282" text-anchor="middle">spam verdict = FAIL?</text>
  <rect class="chip" x="140" y="289" width="160" height="17" rx="8.5"/>
  <text class="chipT" x="220" y="301" text-anchor="middle">opt-in · DROP_SPAM=true</text>
  <rect class="dropB" x="460" y="268" width="170" height="40" rx="20"/>
  <text class="dropT" x="545" y="292.5" text-anchor="middle">Drop · spam</text>

  <rect class="box" x="70" y="348" width="300" height="64" rx="10"/>
  <text class="t2" x="220" y="374" text-anchor="middle">any verdict concerning?</text>
  <text class="sub" x="220" y="392" text-anchor="middle">present, and not PASS / DISABLED</text>

  <rect class="fwdB" x="70" y="448" width="140" height="44" rx="10"/>
  <text class="fwdT" x="140" y="474" text-anchor="middle">Forward</text>
  <rect class="warnB" x="250" y="448" width="180" height="44" rx="10"/>
  <text class="warnT" x="340" y="466" text-anchor="middle">Forward + WARN</text>
  <text class="warnS" x="340" y="482" text-anchor="middle">logged · alarmable</text>

  <g class="edge" marker-end="url(#arrow)">
    <line x1="220" y1="48" x2="220" y2="72"/>
    <line x1="220" y1="132" x2="220" y2="164"/>
    <line x1="220" y1="224" x2="220" y2="256"/>
    <line x1="220" y1="316" x2="220" y2="344"/>
    <line x1="370" y1="104" x2="456" y2="104"/>
    <line x1="370" y1="196" x2="456" y2="196"/>
    <line x1="370" y1="288" x2="456" y2="288"/>
    <path d="M160 412 C 160 430, 140 430, 140 444"/>
    <path d="M290 412 C 290 430, 340 428, 340 444"/>
  </g>
  <text class="lab" x="228" y="152">no</text>
  <text class="lab" x="228" y="244">no</text>
  <text class="lab" x="228" y="336">no</text>
  <text class="lab" x="413" y="97" text-anchor="middle">yes</text>
  <text class="lab" x="413" y="189" text-anchor="middle">yes</text>
  <text class="lab" x="413" y="281" text-anchor="middle">yes</text>
  <text class="lab" x="132" y="432" text-anchor="end">no</text>
  <text class="lab" x="348" y="432">yes</text>
</svg>
