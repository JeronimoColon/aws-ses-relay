<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 470" width="780" height="470" role="img" aria-label="Processing order for each event">
  <title>Processing order</title>
  <style>
    svg {
      --node-fill: #f6f8fa; --node-stroke: #d1d9e0; --node-text: #1f2328;
      --muted: #59636e; --edge: #59636e;
      --accent-fill: #2563eb; --accent-stroke: #1d4ed8;
      --chip-bg: #eaeef2;
      --frame: #8c959f;
    }
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif; }
    .box { fill: var(--node-fill); stroke: var(--node-stroke); stroke-width: 1.25; }
    .accent { fill: var(--accent-fill); stroke: var(--accent-stroke); stroke-width: 1.25; }
    .t2 { font-size: 12px; font-weight: 600; fill: var(--node-text); }
    .tw { font-size: 13px; font-weight: 600; fill: #fff; }
    .msg { font-size: 11px; font-weight: 500; fill: var(--node-text); }
    .code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 10px; fill: var(--muted); }
    .edge { stroke: var(--edge); stroke-width: 1.4; fill: none; }
    .dash { stroke-dasharray: 5 4; }
    .life { stroke: var(--node-stroke); stroke-width: 1.2; stroke-dasharray: 3 3; }
    .note { fill: var(--chip-bg); stroke: var(--node-stroke); stroke-width: 1; }
    .noteT { font-size: 10.5px; fill: var(--muted); }
    .frame { fill: none; stroke: var(--frame); stroke-width: 1.1; }
    .tab { fill: var(--chip-bg); stroke: var(--frame); stroke-width: 1.1; }
    .tabT { font-size: 10px; font-weight: 700; fill: var(--muted); }
    .guard { font-size: 10.5px; font-style: italic; fill: var(--muted); }
    .divider { stroke: var(--frame); stroke-dasharray: 4 4; stroke-width: 1.1; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="var(--edge)"/>
    </marker>
  </defs>

  <g class="life">
    <line x1="80" y1="38" x2="80" y2="458"/>
    <line x1="280" y1="38" x2="280" y2="458"/>
    <line x1="520" y1="38" x2="520" y2="458"/>
    <line x1="690" y1="38" x2="690" y2="458"/>
  </g>

  <rect class="box" x="50" y="8" width="60" height="30" rx="8"/>
  <text class="t2" x="80" y="27" text-anchor="middle">SES</text>
  <rect class="accent" x="215" y="8" width="130" height="30" rx="8"/>
  <text class="tw" x="280" y="27" text-anchor="middle">aws-ses-relay</text>
  <rect class="box" x="490" y="8" width="60" height="30" rx="8"/>
  <text class="t2" x="520" y="27" text-anchor="middle">S3</text>
  <rect class="box" x="655" y="8" width="70" height="30" rx="8"/>
  <text class="t2" x="690" y="27" text-anchor="middle">SESv2</text>

  <rect class="box" x="275" y="72" width="10" height="374" rx="2"/>

  <text class="msg" x="180" y="60" text-anchor="middle">async invoke</text>
  <text class="code" x="180" y="73" text-anchor="middle">recipients · verdicts</text>
  <line class="edge" marker-end="url(#arrow)" x1="80" y1="78" x2="271" y2="78"/>

  <rect class="note" x="170" y="92" width="220" height="26" rx="6"/>
  <text class="noteT" x="280" y="109" text-anchor="middle">verdict gate · resolve destinations</text>

  <rect class="frame" x="36" y="134" width="716" height="318" rx="6"/>
  <path class="tab" d="M36 134 h50 v15 l-7 7 h-43 z"/>
  <text class="tabT" x="49" y="149">alt</text>
  <text class="guard" x="100" y="150">[dropped, or no destination match]</text>

  <text class="msg" x="180" y="170" text-anchor="middle">Ok · zero S3 / SES calls</text>
  <line class="edge dash" marker-end="url(#arrow)" x1="275" y1="178" x2="89" y2="178"/>

  <line class="divider" x1="36" y1="198" x2="752" y2="198"/>
  <text class="guard" x="100" y="216">[forward]</text>

  <text class="code" x="400" y="230" text-anchor="middle">GetObject · key = messageId</text>
  <line class="edge" marker-end="url(#arrow)" x1="285" y1="238" x2="514" y2="238"/>

  <text class="msg" x="400" y="254" text-anchor="middle">raw bytes</text>
  <line class="edge dash" marker-end="url(#arrow)" x1="520" y1="262" x2="291" y2="262"/>

  <rect class="note" x="175" y="276" width="210" height="26" rx="6"/>
  <text class="noteT" x="280" y="293" text-anchor="middle">rewrite headers · byte-level</text>

  <rect class="frame" x="60" y="314" width="540" height="52" rx="6"/>
  <path class="tab" d="M60 314 h50 v15 l-7 7 h-43 z"/>
  <text class="tabT" x="73" y="329">opt</text>
  <text class="guard" x="124" y="330">[idempotency enabled]</text>
  <text class="msg" x="400" y="344" text-anchor="middle">conditional PUT idempotency marker</text>
  <line class="edge" marker-end="url(#arrow)" x1="285" y1="352" x2="514" y2="352"/>

  <text class="msg" x="485" y="386" text-anchor="middle">SendRawEmail · rewritten message</text>
  <line class="edge" marker-end="url(#arrow)" x1="285" y1="394" x2="684" y2="394"/>

  <text class="msg" x="485" y="408" text-anchor="middle">accepted</text>
  <line class="edge dash" marker-end="url(#arrow)" x1="690" y1="416" x2="291" y2="416"/>

  <text class="msg" x="180" y="432" text-anchor="middle">Ok</text>
  <line class="edge dash" marker-end="url(#arrow)" x1="275" y1="440" x2="89" y2="440"/>
</svg>
