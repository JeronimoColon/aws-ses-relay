name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test-lint:
    name: Build, test, lint, cross-compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust (stable) with clippy, rustfmt, and the Lambda target
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master, pinned
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      # Install cargo-lambda and Zig with pinned versions (bump as needed).
      # `--break-system-packages` satisfies PEP 668 on the runner's externally
      # managed Python.
      - name: Install cargo-lambda and Zig
        run: pip3 install --break-system-packages 'cargo-lambda==1.9.1' 'ziglang==0.14.0'

      - name: Cross-compile for Lambda (ARM64) — proves it builds for the runtime
        run: cargo lambda build --release --arm64

  audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check out
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: cargo audit (RustSec advisory database)
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
