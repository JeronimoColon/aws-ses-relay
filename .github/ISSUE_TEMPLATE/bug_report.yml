name: Bug report
description: Report something that isn't working as documented.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please redact any real addresses, domains, bucket
        names, or account ids before submitting.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you observe?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include a minimal event or configuration if relevant (redacted).
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: CloudWatch output or local output. Never paste secrets.
      render: text
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA you are running.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Region, runtime/architecture, and anything else relevant.
    validations:
      required: false
